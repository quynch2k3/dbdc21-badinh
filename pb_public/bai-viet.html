<script>
    let currentCategory = null;
    let articleImages = [];
    let currentImgIndex = 0;
    let currentZoom = 1;

    function applyUnitBranding(cat) {
        if (!cat || !window.SharedUI) return;
        currentCategory = cat;
        
        const headerTitle = document.querySelector('.header-title-main');
        const headerLogo = document.querySelector('.header-logo-img');
        const headerSub = document.querySelector('.header-subtitle');
        
        if (!headerTitle || !headerLogo) return;

        const config = SharedUI.getBrandingByCat(cat);

        headerTitle.textContent = config.unit.toUpperCase();
        headerLogo.src = config.logo;
        if (headerSub) headerSub.textContent = config.org.toUpperCase();
        document.title = `${config.unit} - Địa bàn dân cư số 21`;
        
        // SEO Update (V1.31)
        const ogImg = document.getElementById('meta-og-image');
        if (ogImg) ogImg.content = config.logo;
    }

    async function fetchByDirectId(id) {
        const container = document.getElementById('article-display-area');
        try {
            const article = await pb.collection('articles').getOne(id);
            if (!article) {
                container.innerHTML = '<div style="padding:20px;">Bài viết không tồn tại.</div>';
                return;
            }
            if (article.category) applyUnitBranding(article.category);
            renderArticle(article);
        } catch (err) {
            console.error("Error loading article:", err);
            container.innerHTML = '<div style="color:red; padding:20px;">Lỗi kết nối dữ liệu.</div>';
        }
    }

    function renderArticle(article) {
        const container = document.getElementById('article-display-area');
        
        // Update Meta Tags for Facebook (V1.31)
        document.getElementById('meta-og-url').content = window.location.href;
        document.getElementById('meta-og-title').content = article.title;
        if (article.summary) document.getElementById('meta-og-desc').content = article.summary;
        
        // Priority: Use Article Image for OG:Image (V1.32)
        if (article.image) {
            const ogImg = document.getElementById('meta-og-image');
            if (ogImg) ogImg.content = pb.getFileUrlCustom(article, article.image);
        }

        const displayDate = article.publish_date || article.created;
        const dateStr = new Date(displayDate).toLocaleDateString('vi-VN', {
            year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
        });

        // Parse tags
        const tags = article.tags ? article.tags.split(',').map(t => t.trim()).filter(t => t) : [];
        const tagsHtml = tags.map(t => `<span class="tag-pill">#${t}</span>`).join('');

        // Build premium video HTML dùng MediaSystem V2.0
        let videoHtml = '';
        if (article.video) {
            videoHtml = MediaSystem.createVideoPlayer(article, article.video, article.image);
        }
        
        container.innerHTML = `
            <div class="art-header-box">
                <h1 class="art-title-text">${article.title}</h1>
                <div class="art-meta-info">
                    <span><i class="fa-regular fa-calendar-days"></i> ${dateStr}</span>
                    <span><i class="fa-solid fa-user-pen"></i> ${article.author || 'Ban biên tập'}</span>
                    <span><i class="fa-solid fa-tag"></i> ${article.category || 'Tin tức'}</span>
                </div>
            </div>
            ${videoHtml}
            <div class="art-content-body">
                ${article.content || '<p>Nội dung đang được cập nhật...</p>'}
            </div>
            
            ${tags.length > 0 ? `<div class="art-tags">${tagsHtml}</div>` : ''}
            
            <div style="margin-top: 40px; padding: 20px; border-top: 1px dashed var(--border-legacy); text-align: right;">
                <button onclick="window.print()" class="btn-retro" style="margin-left:10px; padding: 6px 12px; cursor:pointer;">
                    <i class="fa-solid fa-print"></i> In bài viết
                </button>
                <button onclick="history.back()" class="btn-retro" style="margin-left:10px; padding: 6px 12px; cursor:pointer;">
                    <i class="fa-solid fa-arrow-left"></i> Quay lại
                </button>
            </div>
        `;
        
        // Sửa tất cả media trong nội dung (V2.0)
        setTimeout(() => {
            MediaSystem.fixContentMedia(container);

            // 1. Group consecutive images into Slideshows
            groupImagesToSlideshow(container);
            
            // 2. Refresh the image list for Lightbox after grouping
            const allImgs = container.querySelectorAll('.art-content-body img');
            articleImages = Array.from(allImgs).map(img => img.src);
            
            allImgs.forEach((img, idx) => {
                let caption = "";
                // Capture caption from parent slide or original figure
                const slideItem = img.closest('.slide-item');
                if (slideItem) {
                    const capDiv = slideItem.querySelector('.slide-caption');
                    if (capDiv) caption = capDiv.textContent.trim();
                } else {
                    const figure = img.closest('figure');
                    if (figure) {
                        const figcap = figure.querySelector('figcaption');
                        if (figcap) caption = figcap.textContent.trim();
                    }
                }
                img.onclick = () => openLightbox(idx, caption);
            });
        }, 150);
    }

    function groupImagesToSlideshow(container) {
        const body = container.querySelector('.art-content-body');
        if (!body) return;

        const imgs = Array.from(body.querySelectorAll('img'));
        if (imgs.length < 2) return;

        let groups = [];
        let currentGroup = [imgs[0]];

        for (let i = 1; i < imgs.length; i++) {
            const prevImg = currentGroup[currentGroup.length - 1];
            const img = imgs[i];

            const range = document.createRange();
            range.setStartAfter(prevImg);
            range.setEndBefore(img);
            
            const textBetween = range.cloneContents().textContent.trim();
            
            if (textBetween.length < 100) {
                currentGroup.push(img);
            } else {
                if (currentGroup.length >= 2) groups.push([...currentGroup]);
                currentGroup = [img];
            }
        }
        if (currentGroup.length >= 2) groups.push([...currentGroup]);

        groups.forEach(group => {
            const firstImg = group[0];
            const lastImg = group[group.length - 1];
            const sliderId = 'slider-' + Math.random().toString(36).substr(2, 5);
            
            const slidesData = [];
            for (let i = 0; i < group.length; i++) {
                const img = group[i];
                let cap = "";
                
                const figure = img.closest('figure');
                if (figure) {
                    const fc = figure.querySelector('figcaption');
                    if (fc) cap = fc.textContent.trim();
                } 
                
                if (!cap && i < group.length - 1) {
                    const nextImg = group[i+1];
                    const r = document.createRange();
                    r.setStartAfter(img);
                    r.setEndBefore(nextImg);
                    cap = r.cloneContents().textContent.trim();
                }
                
                if (!cap) cap = img.alt || "";
                
                const lowerCap = cap.toLowerCase();
                if (lowerCap.includes('có thể là') || lowerCap.includes('hình ảnh') || lowerCap.includes('image')) {
                    cap = "";
                }
                
                slidesData.push({ src: img.src, cap: cap });
            }

            const sliderHtml = `
                <div class="art-slideshow-container" id="${sliderId}">
                    <div class="slideshow-label"><i class="fa-solid fa-images"></i> TỔ HỢP ẢNH (${slidesData.length})</div>
                    <div class="slideshow-track">
                        ${slidesData.map(d => `
                            <div class="slide-item">
                                <img src="${d.src}" alt="${d.cap}" onerror="MediaSystem.handleImageError(this)">
                                ${d.cap ? `<div class="slide-caption">${d.cap}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                    <div class="slide-nav slide-prev" onclick="moveSlide('${sliderId}', -1)"><i class="fa-solid fa-chevron-left"></i></div>
                    <div class="slide-nav slide-next" onclick="moveSlide('${sliderId}', 1)"><i class="fa-solid fa-chevron-right"></i></div>
                    <div class="slide-dots">
                        ${slidesData.map((_, i) => `<div class="slide-dot ${i===0?'active':''}" onclick="goToSlide('${sliderId}', ${i})"></div>`).join('')}
                    </div>
                </div>
            `;

            const deleteRange = document.createRange();
            deleteRange.setStartBefore(firstImg);
            deleteRange.setEndAfter(lastImg);
            
            const temp = document.createElement('div');
            temp.innerHTML = sliderHtml;
            const sliderEl = temp.firstElementChild;
            
            deleteRange.deleteContents();
            deleteRange.insertNode(sliderEl);

            initSliderLogic(sliderId);
        });
    }


    let sliderStates = {};

    function initSliderLogic(id) {
        sliderStates[id] = { current: 0, interval: null };
        startAutoPlay(id);
    }

    function startAutoPlay(id) {
        if (sliderStates[id].interval) clearInterval(sliderStates[id].interval);
        sliderStates[id].interval = setInterval(() => {
            moveSlide(id, 1);
        }, 5000);
    }

    window.moveSlide = function(id, dir) {
        const slider = document.getElementById(id);
        if (!slider) return;
        const track = slider.querySelector('.slideshow-track');
        const slides = slider.querySelectorAll('.slide-item');
        const state = sliderStates[id];

        state.current = (state.current + dir + slides.length) % slides.length;
        updateSliderUI(id);
        startAutoPlay(id); // Reset timer on manual move
    }

    window.goToSlide = function(id, index) {
        sliderStates[id].current = index;
        updateSliderUI(id);
        startAutoPlay(id);
    }

    function updateSliderUI(id) {
        const slider = document.getElementById(id);
        const track = slider.querySelector('.slideshow-track');
        const dots = slider.querySelectorAll('.slide-dot');
        const state = sliderStates[id];

        track.style.transform = `translateX(-${state.current * 100}%)`;
        dots.forEach((dot, i) => {
            dot.classList.toggle('active', i === state.current);
        });
    }

    // Global keyboard support for visible slider
    document.addEventListener('keydown', (e) => {
        // If lightbox is open, it handles its own arrows
        const lb = document.getElementById('lightbox-modal');
        if (lb && lb.style.display === 'flex') return;

        // Find the slider most centered in viewport
        const sliders = document.querySelectorAll('.art-slideshow-container');
        let closest = null;
        let minDist = Infinity;

        sliders.forEach(s => {
            const rect = s.getBoundingClientRect();
            const dist = Math.abs(rect.top + rect.height/2 - window.innerHeight/2);
            if (dist < minDist) {
                minDist = dist;
                closest = s;
            }
        });

        if (closest) {
            if (e.key === 'ArrowRight') moveSlide(closest.id, 1);
            if (e.key === 'ArrowLeft') moveSlide(closest.id, -1);
        }
    });

    function openLightbox(index, caption = '') {
        currentImgIndex = index;
        let modal = document.getElementById('lightbox-modal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'lightbox-modal';
            const unitName = (window.SharedUI && currentCategory) ? SharedUI.getBrandingByCat(currentCategory).unit : 'Địa bàn dân cư số 21';
            modal.innerHTML = `
                <div class="lightbox-toolbar">
                    <div class="lightbox-info">
                        <div class="lightbox-counter" id="lb-counter"></div>
                        <div class="lightbox-title">${unitName.toUpperCase()}</div>
                    </div>
                    <div class="lightbox-actions">
                        <button class="action-btn" onclick="downloadLightboxImg()" title="Tải ảnh này về"><i class="fa-solid fa-download"></i> <span>Tải xuống</span></button>
                        <button class="action-btn" onclick="copyLightboxLink()" title="Sao chép liên kết"><i class="fa-solid fa-link"></i> <span>Sao chép link</span></button>
                        <button class="action-btn" onclick="closeLightbox()" title="Đóng (Esc)" style="background:#e11d48;"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                </div>
                <div class="lightbox-main-container">
                    <div class="lightbox-viewer">
                        <button class="lightbox-nav lightbox-prev" onclick="prevImg()"><i class="fa-solid fa-chevron-left"></i></button>
                        <img id="lightbox-img" src="">
                        <button class="lightbox-nav lightbox-next" onclick="nextImg()"><i class="fa-solid fa-chevron-right"></i></button>
                        <div class="lightbox-caption-area" id="lb-caption"></div>
                    </div>
                    <div class="lightbox-sidebar">
                        <div class="sidebar-header">Danh sách ảnh</div>
                        <div class="lightbox-gallery-vertical" id="lightbox-gallery"></div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            // Swipe support (V3.0)
            let touchstartX = 0;
            let touchendX = 0;
            modal.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX);
            modal.addEventListener('touchend', e => {
                touchendX = e.changedTouches[0].screenX;
                if (touchstartX - touchendX > 50) nextImg();
                if (touchendX - touchstartX > 50) prevImg();
            });

            // Scroll Zoom Support (V3.2)
            const viewer = modal.querySelector('.lightbox-viewer');
            viewer.addEventListener('wheel', e => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.2 : 0.2;
                currentZoom = Math.min(Math.max(1, currentZoom + delta), 5);
                updateZoom();
            });
        }
        
        currentZoom = 1; // Reset zoom on open
        updateLightbox(caption);
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function updateZoom() {
        const img = document.getElementById('lightbox-img');
        if (img) {
            img.style.transform = `scale(${currentZoom})`;
            img.style.cursor = currentZoom > 1 ? 'zoom-out' : 'zoom-in';
        }
    }

    function updateLightbox(caption = '') {
        const img = document.getElementById('lightbox-img');
        const gallery = document.getElementById('lightbox-gallery');
        const counter = document.getElementById('lb-counter');
        const capArea = document.getElementById('lb-caption');
        if (!img || !gallery) return;

        // Reset zoom when changing image
        currentZoom = 1;
        updateZoom();

        // Update URL (V1.35)
        const url = new URL(window.location.href);
        url.searchParams.set('view_img', currentImgIndex + 1);
        window.history.replaceState({}, '', url);

        img.style.opacity = '0';
        setTimeout(() => {
            img.src = articleImages[currentImgIndex];
            img.style.opacity = '1';
            if (counter) counter.textContent = `Hình ảnh ${currentImgIndex + 1} / ${articleImages.length}`;
            if (capArea) capArea.textContent = caption || '';
        }, 150);

        // Update Gallery
        gallery.innerHTML = articleImages.map((src, idx) => `
            <img class="lightbox-thumb ${idx === currentImgIndex ? 'active' : ''}" 
                 src="${src}" 
                 onclick="currentImgIndex = ${idx}; updateLightbox();">
        `).join('');

        const activeThumb = gallery.querySelector('.lightbox-thumb.active');
        if (activeThumb) activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    async function downloadLightboxImg() {
        const src = articleImages[currentImgIndex];
        try {
            const response = await fetch(src);
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `HNP_21_${Date.now()}.jpg`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        } catch (err) {
            // Fallback if fetch fails (CORS issues)
            window.open(src, '_blank');
        }
    }

    function copyLightboxLink() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => {
            alert("Đã sao chép liên kết hình ảnh vào bộ nhớ tạm!");
        });
    }

    function nextImg() {
        currentImgIndex = (currentImgIndex + 1) % articleImages.length;
        updateLightbox();
    }

    function prevImg() {
        currentImgIndex = (currentImgIndex - 1 + articleImages.length) % articleImages.length;
        updateLightbox();
    }

    function closeLightbox() {
        const modal = document.getElementById('lightbox-modal');
        if (modal) modal.style.display = 'none';
        document.body.style.overflow = '';
        
        const url = new URL(window.location.href);
        url.searchParams.delete('view_img');
        window.history.replaceState({}, '', url);
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
        const modal = document.getElementById('lightbox-modal');
        if (modal && modal.style.display === 'flex') {
            if (e.key === 'ArrowRight') nextImg();
            if (e.key === 'ArrowLeft') prevImg();
            if (e.key === 'Escape') closeLightbox();
        }
    });

    async function loadArticleDetail() {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const urlCat = params.get('cat');
        const idDirect = params.get('id');
        const container = document.getElementById('article-display-area');

        if (urlCat) applyUnitBranding(urlCat);

        // Trường hợp ID trực tiếp (Mới)
        if (idDirect) {
            await fetchByDirectId(idDirect);
            return;
        }

        if (!token) {
            container.innerHTML = '<div style="padding:20px; color:red;">Lỗi: Mã truy cập không hợp lệ.</div>';
            return;
        }

        const secureData = GovSecure.decodeToken(token);
        if (!secureData) {
            container.innerHTML = '<div style="padding:20px; color:red;">Lỗi: Token không hợp lệ.</div>';
            return;
        }

        const { id, cat } = secureData;
        if (cat && !urlCat) applyUnitBranding(cat);

        try {
            const article = await pb.collection('articles').getOne(id);
            if (!article) {
                container.innerHTML = '<div style="padding:20px;">Bài viết không tồn tại.</div>';
                return;
            }
            if (article.category) applyUnitBranding(article.category);
            renderArticle(article);
        } catch (err) {
            console.error("Error loading article:", err);
            container.innerHTML = '<div style="color:red; padding:20px;">Lỗi kết nối dữ liệu.</div>';
        }
    }

    // --- Resilient Branding Poller (High Frequency) ---
    const brandingInterval = setInterval(() => {
        if (currentCategory) {
            applyUnitBranding(currentCategory);
        }
    }, 200);
    
    // Stop polling after 4 seconds to save resources
    setTimeout(() => clearInterval(brandingInterval), 4000);

    document.addEventListener('DOMContentLoaded', () => {
        if (typeof pb !== 'undefined') {
            loadArticleDetail();
        } else {
            window.addEventListener('PBReady', loadArticleDetail, { once: true });
        }
    });
</script>
</body>
</html>
